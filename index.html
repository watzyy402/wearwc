<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Timepieces | High Quality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=0,400;0,500;0,600;1,400&family=Inter:wght=300;400;500&display=swap');
        
        /* Typography & Scrollbar */
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Hide Default Cursor for Custom Cursor */
        body, a, button, select, input { cursor: none !important; }

        /* Custom Luxury Cursor */
        .cursor-dot, .cursor-ring {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
        }
        .cursor-dot {
            width: 6px; height: 6px;
            background-color: #fff;
            transition: transform 0.1s ease-out;
        }
        .cursor-ring {
            width: 32px; height: 32px;
            border: 1px solid rgba(212, 175, 55, 0.5); 
            transition: transform 0.2s ease-out, width 0.2s, height 0.2s, background-color 0.2s;
        }
        .cursor-hover .cursor-ring {
            width: 50px; height: 50px;
            background-color: rgba(255,255,255,0.05);
            border-color: #d4af37;
        }

        /* 3D Tilt Cards */
        .tilt-card {
            transform-style: preserve-3d;
            transform: perspective(1000px);
        }
        .tilt-card-inner {
            transform: translateZ(30px);
        }

        /* Scroll Reveal Parallax */
        .reveal-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- HARDWARE-ACCELERATED PRELOADER KEYFRAMES --- */
        @keyframes watchFloat {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -15px, 0); }
        }

        @keyframes luxuryZoomSequence {
            0% { transform: scale3d(0.4, 0.4, 1); opacity: 0; }
            20% { transform: scale3d(1, 1, 1); opacity: 1; }
            75% { transform: scale3d(1.03, 1.03, 1); opacity: 1; }
            100% { transform: scale3d(25, 25, 1); opacity: 0; }
        }

        @keyframes mechanicalTurn {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .animate-zoom-sequence {
            will-change: transform, opacity;
            animation: luxuryZoomSequence 2.6s cubic-bezier(0.76, 0, 0.18, 1) forwards;
        }

        .animate-watch-float {
            will-change: transform;
            animation: watchFloat 2s ease-in-out infinite alternate;
        }

        .animate-one-turn {
            will-change: transform;
            animation: mechanicalTurn 1.5s cubic-bezier(0.3, 0.05, 0.15, 1) forwards;
            animation-delay: 0.5s;
        }

        /* --- ROLEX DATEJUST 41MM REALISM CSS --- */
        /* Tighter, sharper fluted bezel */
        .bezel-41mm {
            background: repeating-conic-gradient(
                from 0deg,
                #d4af37 0deg 2.5deg,
                #fceeb5 2.5deg 3.5deg,
                #8a6508 3.5deg 5deg,
                #d4af37 5deg 7.5deg
            );
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), inset 0 0 8px rgba(0,0,0,0.7);
        }
