<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wearwc | Exclusive Timepieces</title>
  <style>
    /* --- Premium Theme --- */
    :root {
      --bg-color: #0a0a0c;
      --card-bg: #16181d;
      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;
      --accent: #eab308; /* Luxury gold */
      --border-color: #272a30;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* Standard cursor restored */
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      margin-bottom: 40px;
      text-align: center;
      animation: fadeInDown 0.8s ease-out;
    }

    header h1 {
      font-size: 2.5rem;
      letter-spacing: 2px;
      font-weight: 300;
    }

    /* --- Smooth Animations --- */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Product Display --- */
    .product-container {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      animation: fadeInUp 0.8s ease-out;
    }

    .buy-btn {
      background-color: var(--accent);
      color: #000;
      border: none;
      padding: 14px 28px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: transform 0.2s, background-color 0.2s;
    }

    .buy-btn:hover {
      transform: scale(1.02);
      background-color: #facc15;
    }

    /* --- Checkout Modal --- */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
    }

    .modal-content {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      margin: 10vh auto;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 450px;
      animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .close-btn {
      color: var(--text-muted);
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }

    .close-btn:hover { color: var(--text-main); }

    .input-group {
      margin-top: 15px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 12px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 6px;
      outline: none;
    }

    .input-group input:focus, .input-group select:focus {
      border-color: var(--accent);
    }

    .order-summary {
      margin-top: 25px;
      padding: 15px;
      background: var(--bg-color);
      border-radius: 8px;
      text-align: left;
    }

    .order-summary p {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      color: var(--text-muted);
    }

    .order-summary hr {
      border: 0;
      height: 1px;
      background: var(--border-color);
      margin: 15px 0;
    }

    .order-summary h3 {
      display: flex;
      justify-content: space-between;
      color: var(--text-main);
    }

  </style>
</head>
<body>

  <header>
    <h1>wearwc</h1>
    <p style="color: var(--text-muted);">Redefining Time</p>
  </header>

  <div class="product-container">
    <h2>Luxury Chronograph</h2>
    <p style="color: var(--text-muted); margin: 15px 0;">Premium automatic movement with a sleek stainless steel finish.</p>
    <button class="buy-btn" onclick="openCheckout()">Buy Now</button>
  </div>

  <!-- The Checkout Modal -->
  <div id="checkoutModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeCheckout()">&times;</span>
      <h2 style="margin-bottom: 20px;">Complete Your Order</h2>
      
      <form id="orderForm" onsubmit="submitOrder(event)">
        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" required placeholder="Enter your full name">
        </div>
        
        <div class="input-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" required placeholder="0555 00 00 00">
        </div>
        
        <div class="input-group">
          <label for="city">Delivery City</label>
          <select id="city" required onchange="updateTotal()">
            <option value="" disabled selected>Select your wilaya...</option>
            <option value="msila">M'Sila</option>
            <option value="algiers">Algiers</option>
            <option value="other">Other Wilayas</option>
          </select>
        </div>

        <div class="order-summary">
          <p>Watch Price: <span><span id="watchPriceDisplay">0</span> DZD</span></p>
          <p>Delivery: <span><span id="deliveryPriceDisplay">0</span> DZD</span></p>
          <hr>
          <h3>Total: <span><span id="totalPriceDisplay">0</span> DZD</span></h3>
        </div>

        <button type="submit" class="buy-btn">Confirm Order</button>
      </form>
    </div>
  </div>

  <script>
    // --- Pricing Configuration ---
    const watchPrice = 45000; 
    const deliveryRates = {
      msila: 500,     
      algiers: 800,   
      other: 1200     
    };

    const modal = document.getElementById("checkoutModal");

    function openCheckout() {
      modal.style.display = "block";
      document.getElementById("watchPriceDisplay").textContent = watchPrice.toLocaleString();
      updateTotal(); 
    }

    function closeCheckout() {
      modal.style.display = "none";
    }

    function updateTotal() {
      const citySelect = document.getElementById("city");
      const deliveryDisplay = document.getElementById("deliveryPriceDisplay");
      const totalDisplay = document.getElementById("totalPriceDisplay");

      const selectedCity = citySelect.value;
      const deliveryCost = deliveryRates[selectedCity] || 0;
      
      deliveryDisplay.textContent = deliveryCost.toLocaleString();
      totalDisplay.textContent = (watchPrice + deliveryCost).toLocaleString();
    }

    function submitOrder(event) {
      event.preventDefault();
      alert("Order confirmed! Your data has been securely processed.");
      closeCheckout();
    }

    // Close modal if user clicks outside of it
    window.onclick = function(event) {
      if (event.target == modal) {
        closeCheckout();
      }
    }
  </script>

</body>
</html>
